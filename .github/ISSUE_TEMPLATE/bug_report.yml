name: Bug Report
description: Report a bug to help us improve TraceVault
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true
  - type: input
    id: tracevault-version
    attributes:
      label: TraceVault Version
    validations:
      required: false
  - type: input
    id: os
    attributes:
      label: Operating System
    validations:
      required: false
  - type: input
    id: rust-version
    attributes:
      label: Rust Version
    validations:
      required: false
