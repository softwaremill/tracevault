name: Release-plz

permissions:
  pull-requests: write
  contents: write

on:
  push:
    branches:
      - main

jobs:
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Create enterprise stub (submodule not available in OSS CI)
        run: |
          if [ ! -f enterprise/Cargo.toml ]; then
            mkdir -p enterprise/src
            cat > enterprise/Cargo.toml << 'STUB'
          [package]
          name = "tracevault-enterprise"
          version = "0.1.0"
          edition = "2021"
          publish = false

          [dependencies]
          tracevault-core = { path = "../crates/tracevault-core" }
          async-trait = "0.1"
          STUB
            echo "" > enterprise/src/lib.rs
          fi
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Create enterprise stub (submodule not available in OSS CI)
        run: |
          if [ ! -f enterprise/Cargo.toml ]; then
            mkdir -p enterprise/src
            cat > enterprise/Cargo.toml << 'STUB'
          [package]
          name = "tracevault-enterprise"
          version = "0.1.0"
          edition = "2021"
          publish = false

          [dependencies]
          tracevault-core = { path = "../crates/tracevault-core" }
          async-trait = "0.1"
          STUB
            echo "" > enterprise/src/lib.rs
          fi
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
