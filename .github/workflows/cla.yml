name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request_target') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, 'recheck'))
    steps:
      - name: Check org membership
        id: org-check
        if: github.event_name == 'pull_request_target'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ORG_MEMBERSHIP_TOKEN }}
          script: |
            const author = context.payload.pull_request.user.login;
            const orgs = ['softwaremill', 'virtuslab'];
            for (const org of orgs) {
              try {
                await github.rest.orgs.checkMembershipForUser({ org, username: author });
                console.log(`${author} is a member of ${org}`);
                return true;
              } catch (e) {
                // Not a member of this org, continue
              }
            }
            console.log(`${author} is not a member of any exempt org`);
            return false;
          result-encoding: json

      - name: CLA Assistant
        if: steps.org-check.outputs.result != 'true'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_TOKEN }}
        with:
          path-to-signatures: "signatures/cla.json"
          path-to-document: "https://github.com/softwaremill/tracevault/blob/main/CLA.md"
          branch: "cla-signatures"
          allowlist: "dependabot[bot],renovate[bot],github-actions[bot],release-plz[bot]"

      - name: Skip CLA for org members
        if: steps.org-check.outputs.result == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: 'success',
              context: 'license/cla',
              description: 'CLA not required for org members'
            });
