name: "TraceVault Verify"
description: "Verify AI code governance traces and policies on pull requests and pushes"
branding:
  icon: shield
  color: blue

inputs:
  server-url:
    description: "TraceVault server URL"
    required: true
  api-key:
    description: "TraceVault API key"
    required: true
  version:
    description: "TraceVault CLI version to install (default: latest)"
    required: false
    default: "latest"

runs:
  using: "composite"
  steps:
    - name: Install TraceVault CLI
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        if [ "$VERSION" = "latest" ]; then
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/softwaremill/tracevault/releases/latest \
            | grep "browser_download_url.*tracevault-.*linux-x86_64" \
            | head -1 \
            | cut -d '"' -f 4)
        else
          DOWNLOAD_URL="https://github.com/softwaremill/tracevault/releases/download/${VERSION}/tracevault-linux-x86_64"
        fi

        if [ -z "$DOWNLOAD_URL" ]; then
          echo "::error::Could not determine download URL for TraceVault CLI"
          exit 1
        fi

        echo "Downloading TraceVault CLI from ${DOWNLOAD_URL}..."
        curl -sL "$DOWNLOAD_URL" -o /usr/local/bin/tracevault
        chmod +x /usr/local/bin/tracevault
        tracevault --version

    - name: Detect commit range
      id: commits
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          RANGE="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
        else
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            # New branch push — verify only the head commit
            RANGE="$AFTER~1..$AFTER"
          else
            RANGE="${BEFORE}..${AFTER}"
          fi
        fi
        echo "range=${RANGE}" >> "$GITHUB_OUTPUT"
        echo "Commit range: ${RANGE}"

    - name: Verify commits
      shell: bash
      env:
        TRACEVAULT_SERVER_URL: ${{ inputs.server-url }}
        TRACEVAULT_API_KEY: ${{ inputs.api-key }}
      run: |
        RANGE="${{ steps.commits.outputs.range }}"

        echo "## TraceVault Verification" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"

        if tracevault verify --range "$RANGE" 2>&1 | tee /tmp/tracevault-output.txt; then
          echo "| Result | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Verification | :white_check_mark: Passed |" >> "$GITHUB_STEP_SUMMARY"
        else
          echo "| Result | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Verification | :x: Failed |" >> "$GITHUB_STEP_SUMMARY"
        fi

        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "<details><summary>Details</summary>" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"
        cat /tmp/tracevault-output.txt >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"
        echo "</details>" >> "$GITHUB_STEP_SUMMARY"

        # Re-run to get the exit code (tee masks it)
        tracevault verify --range "$RANGE"
