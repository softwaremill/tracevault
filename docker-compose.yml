services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: tracevault
      POSTGRES_USER: tracevault
      POSTGRES_PASSWORD: tracevault
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracevault"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://tracevault:tracevault@db:5432/tracevault
      HOST: 0.0.0.0
      PORT: 3000
      RUST_LOG: info
      CORS_ORIGIN: http://localhost:5173
      # Required: persistent Ed25519 signing key (base64-encoded 32-byte seed).
      # Generate with: openssl rand -base64 32
      # Without this, signatures won't survive server restarts.
      TRACEVAULT_SIGNING_KEY: ${TRACEVAULT_SIGNING_KEY:?Set TRACEVAULT_SIGNING_KEY env var (openssl rand -base64 32)}
    ports:
      - "3000:3000"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      PUBLIC_API_URL: http://server:3000
    depends_on:
      - server

volumes:
  pgdata:
